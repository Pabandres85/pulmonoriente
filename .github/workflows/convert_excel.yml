name: Convertir Excel a JSON

# Se dispara cuando se sube un archivo Excel a data/excel/
on:
  push:
    paths:
      - 'data/excel/*.xlsx'
      - 'data/excel/*.xls'

jobs:
  convert:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necesario para hacer commit del JSON generado

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Convertir Excel → JSON
        run: python scripts/excel_to_json.py

      - name: Commit y push del JSON generado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intervenciones.json data/intervenciones_meta.json
          git diff --staged --quiet || git commit -m "auto: actualizar intervenciones.json desde Excel [skip ci]"
          git push
